{#
  Video status partial — rendered after job creation AND on each poll.
  - pending / processing → contains hx-trigger="every 5s" so HTMX keeps polling.
  - done   → contains <video> element, no hx-trigger, polling stops automatically.
  - failed → error card, no hx-trigger.
#}
{% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
    {{ error }}
  </div>

{% elif job.status == "done" %}
  {# Terminal state: show video player — no hx-trigger so polling ceases #}
  <div class="border border-green-200 rounded-xl overflow-hidden bg-green-50">
    <div class="px-5 py-3 border-b border-green-200 flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-green-500"></span>
      <span class="text-sm font-medium text-green-800">Video ready!</span>
      <span class="text-xs text-gray-400 ml-auto font-mono">{{ job.task_id|slice:":12" }}…</span>
    </div>
    <div class="p-4">
      <video controls class="w-full rounded-lg shadow" src="{{ job.result_url }}">
        Your browser does not support the video tag.
      </video>
      <p class="text-xs text-gray-500 mt-2">Prompt: {{ job.prompt }}</p>
    </div>
  </div>

{% elif job.status == "failed" %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
    Job {{ job.task_id|slice:":12" }}… failed. Please try again.
  </div>

{% else %}
  {# Pending or processing — keep polling every 5 s #}
  <div hx-get="{% url 'l04_video_status' task_id=job.task_id %}"
       hx-trigger="every 5s"
       hx-swap="outerHTML"
       class="border border-sky-200 rounded-xl px-5 py-4 bg-sky-50 flex items-center gap-3">
    <span class="w-3 h-3 rounded-full bg-sky-400 animate-pulse flex-shrink-0"></span>
    <div>
      <p class="text-sm font-medium text-sky-800">
        {% if job.status == "pending" %}Queued{% else %}Generating{% endif %}…
      </p>
      <p class="text-xs text-gray-500 mt-0.5">
        Job <span class="font-mono">{{ job.task_id|slice:":12" }}…</span> —
        polling every 5 seconds
      </p>
    </div>
  </div>
{% endif %}
