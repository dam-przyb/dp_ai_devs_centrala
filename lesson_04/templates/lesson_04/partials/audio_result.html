{# Audio result partial: transcript + summary #}
{% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
    {{ error }}
  </div>
{% else %}

  {# Summary card #}
  <div class="bg-rose-50 border border-rose-200 rounded-xl px-5 py-4 space-y-1">
    <p class="text-xs font-semibold text-rose-700 uppercase tracking-wider">Summary</p>
    <p class="text-sm text-gray-800">{{ data.summary }}</p>
  </div>

  {# Full transcript (collapsible) #}
  <details class="mt-4 border border-gray-200 rounded-xl overflow-hidden">
    <summary class="bg-gray-50 px-5 py-3 cursor-pointer text-sm font-medium text-gray-600 hover:bg-gray-100">
      Full Transcript ▾
    </summary>
    <pre class="px-5 py-4 text-xs text-gray-700 font-mono whitespace-pre-wrap bg-white leading-relaxed">{{ data.transcript }}</pre>
  </details>

{% endif %}
