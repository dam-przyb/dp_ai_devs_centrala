{# Partial: result of a direct MCP tool call #}
{% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm mt-4">
    {{ error }}
  </div>
{% else %}
  <div class="mt-4 border border-gray-200 rounded-xl overflow-hidden">
    <div class="bg-gray-50 px-4 py-2 border-b flex items-center gap-2">
      <span class="font-mono text-xs font-semibold text-teal-700">{{ tool_name }}</span>
      <span class="text-gray-300">|</span>
      <span class="text-xs text-gray-500 font-mono truncate">{{ tool_args }}</span>
    </div>
    <pre class="px-4 py-3 text-xs text-gray-800 font-mono whitespace-pre-wrap bg-white">{{ output }}</pre>
  </div>
{% endif %}
