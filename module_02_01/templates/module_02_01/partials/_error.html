{# _error.html — Shown when the agent service raises an unexpected exception. #}

<div class="flex justify-start">
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-2xl text-sm space-y-1">
    <p class="font-semibold">Agent error</p>
    <p class="font-mono text-xs">{{ error }}</p>
  </div>
</div>
